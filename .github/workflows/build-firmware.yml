name: Build ESP-Claw Firmware

on:
  push:
    branches: [master, custom-v5]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      board:
        description: 'Target board name'
        required: true
        default: 'esp32_S3_DevKitC_1_breadboard'
        type: choice
        options:
          - esp32_S3_DevKitC_1_breadboard

env:
  IDF_VERSION: v5.5.1
  BOARD: esp32_S3_DevKitC_1_breadboard

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Build firmware
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/application/edge_agent \
            -e CONFIG=${{ env.BOARD }} \
            espressif/idf:${{ env.IDF_VERSION }} \
            bash -c "idf.py gen-bmgr-config -c ./boards -b ${{ env.BOARD }} && idf.py build"

      - name: Extract combined binary
        run: |
          mkdir -p artifacts
          cp application/edge_agent/build/firmware_full.bin artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp-claw-firmware-${{ env.BOARD }}
          path: artifacts/
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/firmware_full.bin
