name: Build ESP-Claw Firmware

on:
  push:
    branches: [master, custom-v5]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  release:
    types: [published]
  workflow_dispatch:

env:
  IDF_VERSION: v5.5.1
  BOARD: esp32_S3_DevKitC_1_breadboard

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install ESP-IDF
        run: |
          git clone --depth 1 -b v5.5.1 https://github.com/espressif/esp-idf.git
          cd esp-idf
          bash install.sh esp32s3
          echo "$PWD" >> $GITHUB_PATH

      - name: Build firmware
        run: |
          source esp-idf/export.sh
          export CONFIG=${{ env.BOARD }}
          cd application/edge_agent
          idf.py build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp-claw-firmware
          path: application/edge_agent/build/firmware_full.bin
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: application/edge_agent/build/firmware_full.bin
