build_doc:
  stage: build
  tags:
    - build
    - brew
  image: node:24
  extends:
    - .rules:build:doc
  needs:
    - job: build_application_edge_agent
      artifacts: true
      optional: true
  script:
    - apt update && apt install -y curl 
    - curl -fsSL https://d2lang.com/install.sh | sh -s --
    - npm install -g pnpm
    - cd docs
    - pnpm install
    - pnpm run generate-firmware-json ../merged_binary
    - pnpm run build
  artifacts:
    when: always
    paths:
      - docs/public/**/*
      - docs/dist/**/*
      - docs/src/flash-tool/firmware.json
    expire_in: 1 week
